  <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join Now - Flex Appeal</title>

<style>
:root{
  --bg:#070707;
  --card:#121212;
  --accent:#ff2a00;
  --accent2:#ff6a00;
  --text:#ffffff;
  --muted:#b8b8b8;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background: radial-gradient(circle at top, #1a1a1a, var(--bg));
  color:var(--text);
  overflow-x:hidden;
}

/* HEADER */
header{
  text-align:center;
  padding:25px;
  background:rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  border-bottom:1px solid rgba(255,42,0,0.3);
}

header h1{
  font-size:28px;
  letter-spacing:3px;
  color:var(--text);
}

/* HERO TEXT */
.join-section{
  padding:80px 20px;
  text-align:center;
}

.join-section h2{
  font-size:52px;
  font-weight:900;
  letter-spacing:2px;
  text-transform:uppercase;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation: glow 2s infinite alternate;
}

@keyframes glow{
  from{filter:drop-shadow(0 0 10px rgba(255,42,0,0.3));}
  to{filter:drop-shadow(0 0 25px rgba(255,42,0,0.7));}
}

.join-section p{
  color:var(--muted);
  margin-top:10px;
  font-size:16px;
}

/* CONTAINER */
.join-container{
  display:flex;
  justify-content:center;
  gap:40px;
  flex-wrap:wrap;
  margin-top:60px;
}

/* CARD */
.card{
  background:rgba(18,18,18,0.9);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:18px;
  padding:30px;
  width:360px;
  box-shadow:0 0 40px rgba(0,0,0,0.6);
  transition:0.4s ease;
  position:relative;
  overflow:hidden;
}

.card::before{
  content:"";
  position:absolute;
  top:-50%;
  left:-50%;
  width:200%;
  height:200%;
  background:linear-gradient(45deg,transparent,rgba(255,42,0,0.1),transparent);
  transform:rotate(25deg);
  transition:0.6s;
}

.card:hover::before{
  left:100%;
}

.card:hover{
  transform:translateY(-10px);
  box-shadow:0 0 60px rgba(255,42,0,0.2);
}

/* FORM */
.join-form h3{
  text-align:left;
  margin-bottom:10px;
  font-size:20px;
  color:var(--text);
}

label{
  display:block;
  margin-top:14px;
  font-size:13px;
  color:var(--muted);
  text-align:left;
}

input, select{
  width:100%;
  padding:13px;
  margin-top:6px;
  border:none;
  border-radius:10px;
  background:#1b1b1b;
  color:white;
  outline:none;
  transition:0.3s;
  border:1px solid transparent;
}

input:focus, select:focus{
  border:1px solid var(--accent);
  box-shadow:0 0 10px rgba(255,42,0,0.2);
}

/* BUTTON */
button{
  width:100%;
  margin-top:22px;
  padding:14px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  border:none;
  border-radius:10px;
  color:white;
  font-size:16px;
  cursor:pointer;
  font-weight:bold;
  letter-spacing:1px;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px rgba(255,42,0,0.4);
}

/* INFO */
.join-info h3{
  font-size:20px;
  margin-bottom:10px;
}

.join-info ul{
  list-style:none;
  margin-top:10px;
}

.join-info ul li{
  margin:12px 0;
  color:var(--muted);
  text-align:left;
  padding-left:24px;
  position:relative;
}

.join-info ul li::before{
  content:"✦";
  position:absolute;
  left:0;
  color:var(--accent);
}

/* PRICE */
.price-box{
  margin-top:25px;
  padding:20px;
  background:rgba(0,0,0,0.6);
  border-left:4px solid var(--accent);
  border-radius:12px;
}

.price-box p{
  color:var(--accent2);
  font-size:22px;
  font-weight:bold;
}

/* RESPONSIVE */
@media(max-width:768px){
  .join-section h2{
    font-size:36px;
  }

  .card{
    width:92%;
  }
}
</style>
</head>

<body>

<header>
  <h1>FLEX APPEAL GYM</h1>
</header>

<section class="join-section">

  <h2>JOIN THE POWER</h2>
  <p>Push harder. Train smarter. Become unstoppable.</p>

  <div class="join-container">

    <!-- FORM -->
    <div class="card join-form">
      <h3>Membership Form</h3>

      <label>Full Name</label>
      <input type="text" placeholder="Enter your name" required>

      <label>Email</label>
      <input type="email" placeholder="Enter your email" required>

      <label>Phone Number</label>
      <input type="tel" placeholder="Enter your phone number" required>

      <label>Select Plan</label>
      <select required>
        <option value="">Choose Plan</option>
        <option>Basic - ₹1500</option>
        <option>Standard - ₹2500</option>
        <option>Premium - ₹3500</option>
      </select>

      <label>Start Date</label>
      <input type="date" required>

      <button type="submit">ACTIVATE MEMBERSHIP</button>
    </div>

    
   

  </div>

</section>

</body>
</html>
    
  </body>
  
</html>
